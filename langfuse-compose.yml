# Langfuse 自托管配置
# 与 MyRAG 共享 PostgreSQL 数据库

services:
  langfuse-server:
    image: langfuse/langfuse:latest
    container_name: langfuse-server
    ports:
      - "3030:3000"
    environment:
      # 数据库连接（共享现有 PostgreSQL）
      # 注意：请根据实际数据库配置修改
      DATABASE_URL: postgresql://myrag:lilin1992@192.168.137.13:5432/myrag

      # 必需配置
      NEXTAUTH_URL: http://localhost:3030
      SECRET_KEY: ${LANGFUSE_SECRET_KEY:-your-secret-key-change-in-production}

      # 安全配置
      NEXT_PUBLIC_SIGNUP_DISABLED: true
      ENABLE_EXPERIMENTAL_FEATURES: false

    restart: unless-stopped