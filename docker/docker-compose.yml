version: '3.8'

services:
  # PostgreSQL + PGVector
  postgres:
    image: pgvector/pgvector:pg15
    container_name: myrag-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-myrag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-myrag123}
      POSTGRES_DB: ${POSTGRES_DB:-myrag}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myrag"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (ARQ 任务队列 + 缓存)
  redis:
    image: redis:7-alpine
    container_name: myrag-redis
    command: redis-server --appendonly yes --maxmemory 512mb
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (文件存储)
  minio:
    image: minio/minio:RELEASE.2024-01
    container_name: myrag-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: myrag-network
